# C0ba1t 官网 - c0ba1t.cn（HTTP 跳 HTTPS + HTTPS）
# 证书已由 certbot 申请；若 certbot 写进了 default，请把 default 里 c0ba1t 相关 server 块删掉，只保留本文件

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name c0ba1t.cn www.c0ba1t.cn;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name c0ba1t.cn www.c0ba1t.cn;

    ssl_certificate     /etc/letsencrypt/live/c0ba1t.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/c0ba1t.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/c0ba1t;
    index index.html;

    # 入口与 SPA 回退：不缓存，保证拿到最新 HTML
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }

    # HTML：不缓存，保证更新后能拿到最新入口页
    location ~* \.html?$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # JS：不缓存，便于更新后及时生效
    location ~* \.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # CSS：不缓存，便于更新后及时生效
    location ~* \.css$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 图片、字体等静态资源：可长期缓存
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
